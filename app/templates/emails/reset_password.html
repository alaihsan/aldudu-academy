<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: 'Inter', Arial, sans-serif; background-color: #f8fafc; padding: 40px 20px;">
    <div style="max-width: 480px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <div style="text-align: center; margin-bottom: 32px;">
            <h1 style="color: #1e1b4b; font-size: 24px; font-weight: 800; margin: 0;">Aldudu Academy</h1>
            <p style="color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px;">Reset Password</p>
        </div>

        <p style="color: #334155; font-size: 15px; line-height: 1.6;">
            Halo <strong>{{ user_name }}</strong>,
        </p>
        <p style="color: #334155; font-size: 15px; line-height: 1.6;">
            Kami menerima permintaan untuk mereset password akun Anda. Klik tombol di bawah untuk membuat password baru.
        </p>

        <div style="text-align: center; margin: 32px 0;">
            <a href="{{ reset_url }}" style="display: inline-block; background: #4f46e5; color: white; text-decoration: none; padding: 14px 32px; border-radius: 12px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">
                Reset Password
            </a>
        </div>

        <p style="color: #94a3b8; font-size: 13px; line-height: 1.6;">
            Link ini berlaku selama 1 jam. Jika Anda tidak meminta reset password, abaikan email ini.
        </p>

        <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 24px 0;">
        <p style="color: #cbd5e1; font-size: 11px; text-align: center;">Aldudu Academy</p>
    </div>
</body>
</html>
