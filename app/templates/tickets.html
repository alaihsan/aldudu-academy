{% extends "base.html" %}
{% block title %}Tickets - Aldudu Academy{% endblock %}
{% block body %}
{% include '_sidebar.html' %}
<div class="lg:ml-72 p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-2xl font-black text-gray-900">Support Tickets</h2>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mt-1">Butuh bantuan? Buat ticket</p>
            </div>
            <button onclick="showCreateModal()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 transition-all active:scale-95">
                + Buat Ticket
            </button>
        </div>

        <!-- Filter -->
        <div class="flex space-x-2 mb-6">
            <button onclick="loadTickets('active')" class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-indigo-600 text-white" id="tab-active">Aktif</button>
            <button onclick="loadTickets('resolved')" class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-gray-100 text-gray-500" id="tab-resolved">Selesai</button>
        </div>

        <div id="tickets-list" class="space-y-3"></div>
    </div>
</div>

<!-- Create Ticket Modal -->
<div id="create-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-lg animate-slide-up">
        <h3 class="text-lg font-black text-gray-900 mb-4">Buat Ticket Baru</h3>
        <form id="create-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Judul</label>
                <input type="text" id="ticket-title" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold" required placeholder="Masalah singkat">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Kategori</label>
                <select id="ticket-category" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none text-sm font-bold">
                    <option value="general">Umum</option>
                    <option value="technical">Teknis</option>
                    <option value="account">Akun</option>
                    <option value="course">Kelas</option>
                    <option value="quiz">Ujian</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Prioritas</label>
                <select id="ticket-priority" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none text-sm font-bold">
                    <option value="low">Rendah</option>
                    <option value="medium" selected>Sedang</option>
                    <option value="high">Tinggi</option>
                    <option value="urgent">Mendesak</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Deskripsi</label>
                <textarea id="ticket-desc" rows="4" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold" required placeholder="Jelaskan masalah Anda..."></textarea>
            </div>
            <div class="flex space-x-3">
                <button type="button" onclick="hideCreateModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-gray-200">Batal</button>
                <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700">Kirim</button>
            </div>
        </form>
    </div>
</div>

<script>
const SLUG = window.location.pathname.split('/')[2];

function showCreateModal() { document.getElementById('create-modal').classList.remove('hidden'); }
function hideCreateModal() { document.getElementById('create-modal').classList.add('hidden'); }

async function loadTickets(status) {
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.className = 'px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-gray-100 text-gray-500');
    document.getElementById(`tab-${status}`).className = 'px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-indigo-600 text-white';

    const res = await fetch(`/s/${SLUG}/api/tickets?status=${status}`);
    const data = await res.json();
    const list = document.getElementById('tickets-list');

    if (!data.tickets.length) {
        list.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">Tidak ada ticket</p>';
        return;
    }

    list.innerHTML = data.tickets.map(t => `
        <a href="/s/${SLUG}/tickets/${t.id}" class="block bg-white rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-start justify-between">
                <div>
                    <span class="text-xs font-mono text-indigo-500 font-bold">${t.ticket_number}</span>
                    <h4 class="font-bold text-gray-900 mt-1">${t.title}</h4>
                    <p class="text-xs text-gray-400 mt-1">${t.category} | ${t.created_at}</p>
                </div>
                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${statusBadge(t.status)}">${t.status.replace('_', ' ')}</span>
            </div>
        </a>
    `).join('');
}

function statusBadge(s) {
    const m = { open: 'bg-blue-50 text-blue-600', in_queue: 'bg-yellow-50 text-yellow-600', in_progress: 'bg-indigo-50 text-indigo-600', waiting_user: 'bg-orange-50 text-orange-600', resolved: 'bg-green-50 text-green-600', closed: 'bg-gray-100 text-gray-500' };
    return m[s] || 'bg-gray-100 text-gray-500';
}

document.getElementById('create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await fetch(`/s/${SLUG}/api/tickets`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            title: document.getElementById('ticket-title').value,
            description: document.getElementById('ticket-desc').value,
            category: document.getElementById('ticket-category').value,
            priority: document.getElementById('ticket-priority').value,
        })
    });
    const data = await res.json();
    if (data.success) {
        hideCreateModal();
        document.getElementById('create-form').reset();
        loadTickets('active');
        Swal.fire('Berhasil', data.message, 'success');
    } else {
        Swal.fire('Error', data.message, 'error');
    }
});

document.addEventListener('DOMContentLoaded', () => loadTickets('active'));
</script>
{% endblock %}
