{% extends "base.html" %}
{% block title %}Reset Password - Aldudu Academy{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md animate-premium-entrance">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-900">Aldudu Academy</h1>
            <p class="text-sm text-gray-400 uppercase tracking-widest mt-1">Password Baru</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8">
            {% if valid %}
            <form id="reset-form" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Password Baru</label>
                    <input type="password" id="new-password" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold transition-all" required minlength="6" placeholder="Minimal 6 karakter">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Konfirmasi Password</label>
                    <input type="password" id="confirm-password" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold transition-all" required minlength="6" placeholder="Ulangi password">
                </div>
                <div id="reset-error" class="hidden bg-red-50 text-red-600 text-sm font-bold p-3 rounded-xl"></div>
                <button type="submit" id="reset-btn" class="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 transition-all active:scale-95">
                    Simpan Password
                </button>
            </form>

            <script>
            document.getElementById('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const pw = document.getElementById('new-password').value;
                const confirm = document.getElementById('confirm-password').value;
                const errorEl = document.getElementById('reset-error');
                const btn = document.getElementById('reset-btn');

                if (pw !== confirm) {
                    errorEl.textContent = 'Password tidak cocok.';
                    errorEl.classList.remove('hidden');
                    return;
                }

                btn.disabled = true;
                btn.innerText = 'MENYIMPAN...';
                errorEl.classList.add('hidden');

                try {
                    const res = await fetch('/api/reset-password/{{ token }}', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: pw })
                    });
                    const data = await res.json();

                    if (data.success) {
                        document.querySelector('.bg-white').innerHTML = `
                            <div class="text-center py-4">
                                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                    </svg>
                                </div>
                                <h3 class="text-xl font-black text-gray-900 mb-2">Password Berhasil Direset!</h3>
                                <a href="/login" class="text-indigo-600 font-bold text-sm hover:underline">Login dengan password baru</a>
                            </div>
                        `;
                    } else {
                        errorEl.textContent = data.message;
                        errorEl.classList.remove('hidden');
                    }
                } catch (err) {
                    errorEl.textContent = 'Terjadi kesalahan koneksi.';
                    errorEl.classList.remove('hidden');
                } finally {
                    btn.disabled = false;
                    btn.innerText = 'SIMPAN PASSWORD';
                }
            });
            </script>
            {% else %}
            <div class="text-center py-4">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </div>
                <h3 class="text-xl font-black text-gray-900 mb-2">Link Tidak Valid</h3>
                <p class="text-sm text-gray-500 mb-6">Link reset password tidak valid atau sudah kadaluarsa.</p>
                <a href="/forgot-password" class="text-indigo-600 font-bold text-sm hover:underline">Minta link baru</a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
