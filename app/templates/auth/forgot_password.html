{% extends "base.html" %}
{% block title %}Lupa Password - Aldudu Academy{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md animate-premium-entrance">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-900">Aldudu Academy</h1>
            <p class="text-sm text-gray-400 uppercase tracking-widest mt-1">Reset Password</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8">
            <form id="forgot-form" class="space-y-5">
                <p class="text-sm text-gray-500">Masukkan email akun Anda. Kami akan mengirimkan link untuk reset password.</p>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Email</label>
                    <input type="email" id="forgot-email" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold transition-all" required placeholder="email@sekolah.com">
                </div>
                <div id="forgot-msg" class="hidden text-sm font-bold p-3 rounded-xl"></div>
                <button type="submit" id="forgot-btn" class="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 transition-all active:scale-95">
                    Kirim Link Reset
                </button>
            </form>
            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-indigo-600 font-bold hover:underline">Kembali ke Login</a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('forgot-btn');
    const msgEl = document.getElementById('forgot-msg');
    btn.disabled = true;
    btn.innerText = 'MENGIRIM...';

    try {
        const res = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('forgot-email').value })
        });
        const data = await res.json();
        msgEl.className = 'text-sm font-bold p-3 rounded-xl bg-green-50 text-green-600';
        msgEl.textContent = 'Jika email terdaftar, link reset telah dikirim. Cek inbox Anda.';
        msgEl.classList.remove('hidden');
    } catch (err) {
        msgEl.className = 'text-sm font-bold p-3 rounded-xl bg-red-50 text-red-600';
        msgEl.textContent = 'Terjadi kesalahan koneksi.';
        msgEl.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerText = 'KIRIM LINK RESET';
    }
});
</script>
{% endblock %}
