{% extends "base.html" %}
{% block title %}Daftar Sekolah - Aldudu Academy{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-lg">
        <div class="text-center mb-8 animate-premium-entrance">
            <h1 class="text-3xl font-black text-gray-900">Aldudu Academy</h1>
            <p class="text-sm text-gray-400 uppercase tracking-widest mt-1">Daftarkan Sekolah Anda</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 animate-premium-entrance delay-100">
            <form id="register-form" class="space-y-5">
                <div class="border-b border-gray-100 pb-4 mb-4">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Info Sekolah</h3>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Nama Sekolah</label>
                    <input type="text" id="school-name" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold transition-all" required placeholder="SMKN 1 Jakarta">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Slug URL</label>
                    <div class="flex items-center bg-gray-50 border border-gray-100 rounded-xl overflow-hidden">
                        <span class="px-3 text-xs text-gray-400 font-mono">/s/</span>
                        <input type="text" id="school-slug" class="flex-1 px-2 py-3 bg-transparent outline-none text-sm font-bold" required placeholder="smkn1-jakarta" pattern="[a-z0-9-]+">
                    </div>
                    <p class="text-[10px] text-gray-400 mt-1">Huruf kecil, angka, dan strip saja</p>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Email Sekolah</label>
                    <input type="email" id="school-email" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold transition-all" required placeholder="info@smkn1.sch.id">
                </div>

                <div class="border-b border-gray-100 pb-4 mb-4 mt-6">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Akun Admin</h3>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Nama Admin</label>
                    <input type="text" id="admin-name" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold transition-all" required placeholder="Nama lengkap">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Email Admin</label>
                    <input type="email" id="admin-email" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold transition-all" required placeholder="admin@email.com">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Password</label>
                    <input type="password" id="admin-password" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:border-indigo-500 outline-none text-sm font-bold transition-all" required minlength="6" placeholder="Minimal 6 karakter">
                </div>

                <div id="register-error" class="hidden bg-red-50 text-red-600 text-sm font-bold p-3 rounded-xl"></div>

                <button type="submit" id="register-btn" class="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 transition-all active:scale-95 shadow-lg shadow-indigo-100">
                    Daftarkan Sekolah
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-indigo-600 font-bold hover:underline">Sudah punya akun? Login</a>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/auth/register.js') }}?v={{ asset_hash('js/auth/register.js') }}"></script>
{% endblock %}
