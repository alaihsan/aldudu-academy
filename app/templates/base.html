<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aldudu Academy{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "system-ui", "sans-serif"],
                    },
                    colors: {
                        primary: {
                            50: "#eff6ff",
                            100: "#dbeafe",
                            200: "#bfdbfe",
                            300: "#93c5fd",
                            400: "#60a5fa",
                            500: "#3b82f6",
                            600: "#2563eb",
                            700: "#1d4ed8",
                            800: "#1e40af",
                            900: "#1e3a8a",
                        },
                    },
                    animation: {
                        "fade-in": "fadeIn 0.3s ease-in-out",
                        "slide-up": "slideUp 0.4s ease-out",
                        "slide-down": "slideDown 0.3s ease-out",
                    },
                    keyframes: {
                        fadeIn: {
                            "0%": { opacity: "0" },
                            "100%": { opacity: "1" },
                        },
                        slideUp: {
                            "0%": { transform: "translateY(20px)", opacity: "0" },
                            "100%": { transform: "translateY(0)", opacity: "1" },
                        },
                        slideDown: {
                            "0%": { transform: "translateY(-10px)", opacity: "0" },
                            "100%": { transform: "translateY(0)", opacity: "1" },
                        },
                    },
                },
            },
        }
    </script>
    
    <!-- Custom CSS with versioning to bypass cache -->
    <link rel="stylesheet" href="{{ url_for('static', filename='custom.css') }}?v={{ range(1, 9999) | random }}">
    
    <!-- HTMX for SPA feel -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.10/dist/htmx.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        
        /* Page Transitions */
        .page-transition {
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Bar (NProgress style) */
        .htmx-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: #2563eb;
            z-index: 9999;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }
        .htmx-request .htmx-progress {
            width: 40%;
            animation: progress-run 2s infinite ease-in-out;
        }
        @keyframes progress-run {
            0% { width: 0%; left: 0%; }
            50% { width: 70%; left: 15%; }
            100% { width: 100%; left: 100%; }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Modal transitions */
        .modal { transition: opacity 0.3s ease; }
        .modal.hidden { opacity: 0; pointer-events: none; }
        .modal:not(.hidden) { opacity: 1; pointer-events: auto; }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="font-sans antialiased bg-gray-50 text-gray-900">
    <div class="htmx-progress"></div>
    <div class="page-transition">
        {% block body %}{% endblock %}
    </div>

    
    {% block extra_scripts %}{% endblock %}
    
    <!-- Sidebar & Global Logic -->
    <script src="{{ url_for('static', filename='js/sidebar.js') }}?v={{ range(1, 9999) | random }}"></script>
    
    <script>
        // Force refresh dashboard/page logic on HTMX swaps
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            // If we're on dashboard, re-init it
            if (window.Dashboard && typeof window.Dashboard.init === 'function') {
                window.Dashboard.init();
            }
            // If we're on course detail, re-init it
            if (window.CourseDetail && typeof window.CourseDetail.init === 'function') {
                window.CourseDetail.init();
            }
        });
    </script>
</body>
</html>
