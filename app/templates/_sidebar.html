<!-- Sidebar Partial -->
<aside class="w-64 bg-white border-r border-gray-200 hidden lg:flex flex-col sticky top-0 h-screen">
    <div class="p-6 border-b border-gray-100">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl flex items-center justify-center shadow-lg shadow-primary-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
            </div>
            <span class="text-xl font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent">Aldudu</span>
        </div>
    </div>
    
    <nav class="flex-1 p-4 space-y-1">
        <a href="{{ url_for('main.dashboard') }}" class="flex items-center space-x-3 px-4 py-3 {% if request.endpoint == 'main.dashboard' %}bg-primary-50 text-primary-700 font-semibold{% else %}text-gray-600 hover:bg-gray-50{% endif %} rounded-xl transition-all duration-200" hx-boost="false">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span>Dashboard</span>
        </a>
        
        {% if course %}
        <div class="pt-4 space-y-1">
            <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Navigasi Kelas</p>
            <a href="{{ url_for('main.course_detail', course_id=course.id) }}" class="flex items-center space-x-3 px-4 py-3 {% if request.endpoint == 'main.course_detail' %}bg-primary-50 text-primary-700 font-semibold{% else %}text-gray-600 hover:bg-gray-50{% endif %} rounded-xl transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13"/>
                </svg>
                <span>Materi & Tugas</span>
            </a>
        </div>
        {% endif %}

        <div class="pt-4 space-y-1">
            <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bantuan & Masalah</p>
            <a href="{{ url_for('main.issues') }}" class="flex items-center space-x-3 px-4 py-3 {% if request.endpoint == 'main.issues' %}bg-primary-50 text-primary-700 font-semibold{% else %}text-gray-600 hover:bg-gray-50{% endif %} rounded-xl transition-all duration-200">
                <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <span>Manajemen Masalah</span>
            </a>
        </div>
    </nav>

    <!-- User Profile Section with Popup Logout -->
    <div class="p-4 border-t border-gray-100 relative">
        <!-- User Menu Popup -->
        <div id="user-menu-popup" class="hidden absolute bottom-full left-4 right-4 mb-2 bg-white rounded-2xl shadow-2xl border border-gray-100 py-2 animate-slide-up z-50">
            <button onclick="handleGlobalLogout()" class="w-full flex items-center space-x-3 px-4 py-3 text-red-600 hover:bg-red-50 transition-all font-bold text-sm">
                <div class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </div>
                <span>Keluar Aplikasi</span>
            </button>
        </div>

        <button id="user-profile-btn" class="w-full flex items-center space-x-3 p-3 hover:bg-gray-50 rounded-2xl transition-all group active:scale-95">
            <div class="w-10 h-10 rounded-xl bg-primary-600 text-white flex items-center justify-center font-bold text-lg shadow-lg shadow-primary-100">
                {{ current_user.name[0] | upper if current_user.is_authenticated else 'A' }}
            </div>
            <div class="flex-1 min-w-0 text-left">
                <p class="text-sm font-bold text-gray-900 truncate">{{ current_user.name if current_user.is_authenticated else 'User' }}</p>
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest leading-none">{{ current_user.role.value if current_user.is_authenticated else 'Role' }}</p>
            </div>
            <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-transform duration-300" id="profile-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
            </svg>
        </button>
    </div>
</aside>
