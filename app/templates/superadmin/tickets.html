{% extends "superadmin/base.html" %}
{% block title %}Tiket Support — Super Admin{% endblock %}
{% block page_title %}Tiket Support{% endblock %}
{% block page_subtitle %}Kelola semua tiket dari sekolah{% endblock %}

{% block content %}
<!-- Filter Tabs -->
<div class="flex items-center gap-2 mb-5 flex-wrap">
    <button onclick="loadTickets('active')"   id="tab-active"   class="sa-tab active">Aktif</button>
    <button onclick="loadTickets('resolved')" id="tab-resolved" class="sa-tab">Selesai</button>
    <button onclick="loadTickets(null)"       id="tab-all"      class="sa-tab">Semua</button>
</div>

<div id="tickets-list"></div>
<div id="pagination" class="flex justify-center gap-1.5 mt-5"></div>
{% endblock %}

{% block extra_scripts %}
<script>
let currentFilter = 'active';
let currentPage   = 1;

async function loadTickets(status, page) {
    if (status !== undefined) { currentFilter = status; currentPage = 1; }
    if (page) currentPage = page;

    document.querySelectorAll('.sa-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(currentFilter ? `tab-${currentFilter}` : 'tab-all')?.classList.add('active');

    const list = document.getElementById('tickets-list');
    list.innerHTML = `<div class="flex items-center justify-center py-16 text-slate-300">
        <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
    </div>`;

    let url = `/superadmin/api/tickets?page=${currentPage}`;
    if (currentFilter) url += `&status=${currentFilter}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.tickets.length) {
        list.innerHTML = `<div class="sa-card flex flex-col items-center py-16 text-center">
            <svg class="w-12 h-12 text-slate-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
            <p class="text-sm font-bold text-slate-400">Tidak ada tiket</p>
        </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    list.innerHTML = `<div class="space-y-3">${data.tickets.map(t => `
        <a href="/superadmin/tickets/${t.id}" class="sa-card p-5 flex items-start gap-4 hover:shadow-md transition-all group block">
            <!-- Priority bar -->
            <div class="w-1 self-stretch rounded-full flex-shrink-0 ${priorityBar(t.priority)}"></div>
            <!-- Content -->
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <span class="text-xs font-mono font-bold text-indigo-500">${escHtml(t.ticket_number)}</span>
                    <span class="sa-badge ${priorityBadgeClass(t.priority)}">${t.priority}</span>
                    <span class="sa-badge ${statusBadgeClass(t.status)}">${t.status.replace('_',' ')}</span>
                </div>
                <h4 class="font-bold text-slate-900 text-sm group-hover:text-indigo-600 transition-colors">${escHtml(t.title)}</h4>
                <p class="text-xs text-slate-400 mt-0.5">${escHtml(t.school_name)} · ${escHtml(t.user_name)} · ${t.created_at}</p>
            </div>
            <svg class="w-4 h-4 text-slate-300 group-hover:text-indigo-400 transition-colors flex-shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </a>
    `).join('')}</div>`;

    // Pagination
    const pag = document.getElementById('pagination');
    if (data.pages > 1) {
        let html = '';
        for (let i = 1; i <= data.pages; i++) {
            html += `<button onclick="loadTickets(undefined,${i})" class="w-8 h-8 rounded-lg text-sm font-bold transition-all ${i===currentPage?'bg-indigo-600 text-white shadow-sm':'bg-white text-slate-500 hover:bg-slate-100 border border-slate-200'}">${i}</button>`;
        }
        pag.innerHTML = html;
    } else { pag.innerHTML = ''; }
}

const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function priorityBar(p) {
    return { urgent:'bg-red-500', high:'bg-orange-400', medium:'bg-yellow-400', low:'bg-slate-300' }[p] || 'bg-slate-300';
}
function priorityBadgeClass(p) {
    return { urgent:'bg-red-50 text-red-600 border border-red-100', high:'bg-orange-50 text-orange-600 border border-orange-100', medium:'bg-yellow-50 text-yellow-700 border border-yellow-100', low:'bg-slate-100 text-slate-500' }[p] || 'bg-slate-100 text-slate-500';
}
function statusBadgeClass(s) {
    return { open:'bg-blue-50 text-blue-600 border border-blue-100', in_queue:'bg-yellow-50 text-yellow-700 border border-yellow-100', in_progress:'bg-indigo-50 text-indigo-600 border border-indigo-100', waiting_user:'bg-orange-50 text-orange-600 border border-orange-100', resolved:'bg-emerald-50 text-emerald-700 border border-emerald-100', closed:'bg-slate-100 text-slate-500' }[s] || 'bg-slate-100 text-slate-500';
}

document.addEventListener('DOMContentLoaded', () => loadTickets('active'));
</script>
{% endblock %}
