{% extends "base.html" %}
{% block title %}Kelola Tickets - Super Admin{% endblock %}
{% block body %}
<div class="min-h-screen bg-gray-50">
    <header class="bg-white border-b border-gray-100 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-xl font-black text-gray-900">Kelola Tickets</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Super Admin</p>
            </div>
            <div class="flex items-center space-x-4">
                <a href="/superadmin/dashboard" class="text-sm font-bold text-gray-500 hover:text-indigo-600">Dashboard</a>
                <a href="/superadmin/schools" class="text-sm font-bold text-gray-500 hover:text-indigo-600">Sekolah</a>
                <button onclick="handleLogout()" class="text-sm font-bold text-red-500 hover:text-red-600">Logout</button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex space-x-2 mb-6">
            <button onclick="loadTickets('active')" class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-indigo-600 text-white" id="tab-active">Aktif</button>
            <button onclick="loadTickets('resolved')" class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-gray-100 text-gray-500 hover:bg-gray-200" id="tab-resolved">Selesai</button>
            <button onclick="loadTickets()" class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-gray-100 text-gray-500 hover:bg-gray-200" id="tab-all">Semua</button>
        </div>

        <div id="tickets-list" class="space-y-3"></div>
        <div id="pagination" class="flex justify-center mt-6 space-x-2"></div>
    </div>
</div>

<script>
let currentFilter = 'active';
let currentPage = 1;

async function loadTickets(status, page) {
    if (status !== undefined) currentFilter = status;
    if (page) currentPage = page;
    else currentPage = 1;

    let url = `/superadmin/api/tickets?page=${currentPage}`;
    if (currentFilter) url += `&status=${currentFilter}`;

    const res = await fetch(url);
    const data = await res.json();

    // Update tabs
    document.querySelectorAll('[id^="tab-"]').forEach(t => {
        t.className = 'px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-gray-100 text-gray-500 hover:bg-gray-200';
    });
    const activeTab = document.getElementById(`tab-${currentFilter || 'all'}`);
    if (activeTab) activeTab.className = 'px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest bg-indigo-600 text-white';

    const list = document.getElementById('tickets-list');
    if (!data.tickets.length) {
        list.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">Tidak ada ticket</p>';
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    list.innerHTML = data.tickets.map(t => `
        <a href="/superadmin/tickets/${t.id}" class="block bg-white rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-start justify-between">
                <div>
                    <div class="flex items-center space-x-2 mb-1">
                        <span class="text-xs font-mono text-indigo-500 font-bold">${t.ticket_number}</span>
                        <span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase ${priorityBadge(t.priority)}">${t.priority}</span>
                    </div>
                    <h4 class="font-bold text-gray-900">${t.title}</h4>
                    <p class="text-xs text-gray-400 mt-1">${t.school_name} | ${t.user_name} | ${t.created_at}</p>
                </div>
                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${statusBadge(t.status)}">${t.status.replace('_', ' ')}</span>
            </div>
        </a>
    `).join('');

    // Pagination
    const pag = document.getElementById('pagination');
    if (data.pages > 1) {
        let html = '';
        for (let i = 1; i <= data.pages; i++) {
            html += `<button onclick="loadTickets(undefined, ${i})" class="px-3 py-1 rounded-lg text-sm font-bold ${i === currentPage ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">${i}</button>`;
        }
        pag.innerHTML = html;
    } else {
        pag.innerHTML = '';
    }
}

function priorityBadge(p) {
    switch(p) {
        case 'urgent': return 'bg-red-100 text-red-600';
        case 'high': return 'bg-orange-100 text-orange-600';
        case 'medium': return 'bg-yellow-100 text-yellow-600';
        case 'low': return 'bg-gray-100 text-gray-500';
    }
}

function statusBadge(s) {
    switch(s) {
        case 'open': return 'bg-blue-50 text-blue-600';
        case 'in_queue': return 'bg-yellow-50 text-yellow-600';
        case 'in_progress': return 'bg-indigo-50 text-indigo-600';
        case 'waiting_user': return 'bg-orange-50 text-orange-600';
        case 'resolved': return 'bg-green-50 text-green-600';
        case 'closed': return 'bg-gray-100 text-gray-500';
    }
}

async function handleLogout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
}

document.addEventListener('DOMContentLoaded', () => loadTickets('active'));
</script>
{% endblock %}
