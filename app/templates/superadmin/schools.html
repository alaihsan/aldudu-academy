{% extends "superadmin/base.html" %}
{% block title %}Kelola Sekolah — Super Admin{% endblock %}
{% block page_title %}Kelola Sekolah{% endblock %}
{% block page_subtitle %}Daftar & manajemen semua sekolah{% endblock %}

{% block content %}
<!-- Filter Tabs -->
<div class="flex items-center gap-2 mb-5 flex-wrap">
    <button onclick="loadSchools(null)"        id="tab-all"       class="sa-tab active">Semua</button>
    <button onclick="loadSchools('pending')"    id="tab-pending"   class="sa-tab">Belum Verifikasi</button>
    <button onclick="loadSchools('verified')"   id="tab-verified"  class="sa-tab">Pending Approval</button>
    <button onclick="loadSchools('active')"     id="tab-active"    class="sa-tab">Aktif</button>
    <button onclick="loadSchools('suspended')"  id="tab-suspended" class="sa-tab">Suspended</button>
</div>

<!-- Schools List -->
<div id="schools-list">
    <div class="flex items-center justify-center py-16 text-slate-300">
        <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/superadmin/sa-core.js') }}?v={{ asset_hash('js/superadmin/sa-core.js') }}"></script>
<script src="{{ url_for('static', filename='js/superadmin/schools.js') }}?v={{ asset_hash('js/superadmin/schools.js') }}"></script>
{% endblock %}
