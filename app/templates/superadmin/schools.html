{% extends "superadmin/base.html" %}
{% block title %}Kelola Sekolah — Super Admin{% endblock %}
{% block page_title %}Kelola Sekolah{% endblock %}
{% block page_subtitle %}Daftar & manajemen semua sekolah{% endblock %}

{% block content %}
<!-- Filter Tabs -->
<div class="flex items-center gap-2 mb-5 flex-wrap">
    <button onclick="loadSchools(null)"        id="tab-all"       class="sa-tab active">Semua</button>
    <button onclick="loadSchools('pending')"    id="tab-pending"   class="sa-tab">Belum Verifikasi</button>
    <button onclick="loadSchools('verified')"   id="tab-verified"  class="sa-tab">Pending Approval</button>
    <button onclick="loadSchools('active')"     id="tab-active"    class="sa-tab">Aktif</button>
    <button onclick="loadSchools('suspended')"  id="tab-suspended" class="sa-tab">Suspended</button>
</div>

<!-- Schools List -->
<div id="schools-list">
    <div class="flex items-center justify-center py-16 text-slate-300">
        <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let currentFilter = null;

async function loadSchools(status) {
    currentFilter = status;
    document.querySelectorAll('.sa-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(status ? `tab-${status}` : 'tab-all')?.classList.add('active');

    const list = document.getElementById('schools-list');
    list.innerHTML = `<div class="flex items-center justify-center py-16 text-slate-300 dark:text-gray-600">
        <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
    </div>`;

    const url = status ? `/superadmin/api/schools?status=${status}` : '/superadmin/api/schools';
    const res = await fetch(url);
    const data = await res.json();

    if (!data.schools.length) {
        list.innerHTML = `<div class="sa-card flex flex-col items-center py-16 text-center">
            <svg class="w-12 h-12 text-slate-200 dark:text-gray-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg>
            <p class="text-sm font-bold text-slate-400 dark:text-gray-500">Tidak ada sekolah</p>
        </div>`;
        return;
    }

    list.innerHTML = `<div class="space-y-3">${data.schools.map(s => `
        <div class="sa-card p-5 flex items-center gap-4 hover:shadow-md transition-all">
            <div class="w-11 h-11 rounded-xl bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center flex-shrink-0 font-black text-indigo-600 dark:text-indigo-400 text-base">
                ${escHtml(s.name.charAt(0).toUpperCase())}
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                    <h4 class="font-black text-slate-900 dark:text-gray-100 text-sm">${escHtml(s.name)}</h4>
                    <span class="sa-badge ${statusBadgeClass(s.status)}">${statusLabel(s.status)}</span>
                </div>
                <p class="text-xs text-slate-400 dark:text-gray-500 mt-0.5">
                    <span class="font-mono">/s/${escHtml(s.slug)}</span>
                    <span class="mx-1.5 text-slate-200 dark:text-gray-600">·</span>
                    ${escHtml(s.admin_email || '—')}
                </p>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                ${s.status === 'verified' ? `<button onclick="approveSchool(${s.id})" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-xs font-black uppercase tracking-wide transition-all active:scale-95 shadow-sm">Setujui</button>` : ''}
                ${s.status === 'pending' ? `<button onclick="bypassApproveSchool(${s.id})" class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg text-xs font-black uppercase tracking-wide transition-all active:scale-95 shadow-sm" title="Bypass verifikasi email dan langsung setujui">&#9889; Bypass &amp; Setujui</button>` : ''}
                ${s.status === 'active' ? `<button onclick="suspendSchool(${s.id})" class="px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg text-xs font-black uppercase tracking-wide transition-all active:scale-95">Suspend</button>` : ''}
                ${s.status === 'suspended' ? `<button onclick="reactivateSchool(${s.id})" class="px-4 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 rounded-lg text-xs font-black uppercase tracking-wide transition-all active:scale-95">Aktifkan</button>` : ''}
            </div>
        </div>
    `).join('')}</div>`;
}

const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function statusBadgeClass(s) {
    return { active: 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-800', verified: 'bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 border border-amber-100 dark:border-amber-800', pending: 'bg-slate-100 dark:bg-gray-700 text-slate-500 dark:text-gray-400', suspended: 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 border border-red-100 dark:border-red-800' }[s] || 'bg-slate-100 dark:bg-gray-700 text-slate-500 dark:text-gray-400';
}
function statusLabel(s) {
    return { active: 'Aktif', verified: 'Pending', pending: 'Belum Verifikasi', suspended: 'Suspended' }[s] || s;
}

async function approveSchool(id) {
    if (!await window.ask('Setujui Sekolah?', 'Sekolah akan diaktifkan dan admin menerima email konfirmasi bergabung.')) return;
    const res = await fetch(`/superadmin/api/schools/${id}/approve`, { method: 'POST' });
    const data = await res.json();
    if (data.success) { Swal.fire({ icon:'success', title:'Disetujui!', text: data.message, timer:2500, showConfirmButton:false }); loadSchools(currentFilter); }
    else Swal.fire({ icon:'error', title:'Gagal', text:data.message });
}

async function bypassApproveSchool(id) {
    const confirmed = await Swal.fire({
        icon: 'warning',
        title: 'Bypass Verifikasi Email?',
        html: 'Email admin sekolah ini <strong>belum diverifikasi</strong>.<br>Lanjutkan untuk langsung mengaktifkan sekolah?',
        showCancelButton: true,
        confirmButtonText: '&#9889; Ya, Bypass & Setujui',
        cancelButtonText: 'Batal',
        confirmButtonColor: '#f59e0b',
    });
    if (!confirmed.isConfirmed) return;
    const res = await fetch(`/superadmin/api/schools/${id}/approve`, { method: 'POST' });
    const data = await res.json();
    if (data.success) { Swal.fire({ icon:'success', title:'Disetujui!', text: data.message, timer:2500, showConfirmButton:false }); loadSchools(currentFilter); }
    else Swal.fire({ icon:'error', title:'Gagal', text:data.message });
}

async function suspendSchool(id) {
    if (!await window.ask('Suspend Sekolah?', 'Semua pengguna tidak bisa login.', 'warning')) return;
    const res = await fetch(`/superadmin/api/schools/${id}/suspend`, { method: 'POST' });
    const data = await res.json();
    if (data.success) { Swal.fire({ icon:'success', title:'Suspended', timer:2000, showConfirmButton:false }); loadSchools(currentFilter); }
}

async function reactivateSchool(id) {
    if (!await window.ask('Aktifkan kembali?', 'Pengguna sekolah ini bisa login kembali.')) return;
    const res = await fetch(`/superadmin/api/schools/${id}/reactivate`, { method: 'POST' });
    const data = await res.json();
    if (data.success) { Swal.fire({ icon:'success', title:'Aktif!', timer:2000, showConfirmButton:false }); loadSchools(currentFilter); }
}

document.addEventListener('DOMContentLoaded', () => loadSchools(null));
</script>
{% endblock %}
