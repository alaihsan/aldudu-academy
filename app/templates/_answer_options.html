<div class="options-list space-y-3">
    {% for option in question.options %}
    <label class="option-item flex items-center space-x-4 p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-primary-500 transition-all {% if option.is_correct %}bg-green-50 border-green-300{% endif %}">
        <input type="radio" name="question_{{ question.id }}" value="{{ option.id }}" class="w-5 h-5 text-primary-600 focus:ring-primary-500" {% if option.is_correct %}checked{% endif %}>
        <span class="w-8 h-8 bg-gray-100 text-gray-700 rounded-full flex items-center justify-center font-bold">{{ loop.index + 64 | chr }}</span>
        <span class="flex-1 text-gray-800">{{ option.text }}</span>
        {% if option.is_correct %}
        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {% endif %}
    </label>
    {% endfor %}
</div>
