<div class="option-row group/opt" id="option-{{ option.id }}">
    <div class="flex items-center space-x-3 w-full">
        <!-- Radio/Icon indicator -->
        <div class="flex-shrink-0">
            {% if question.question_type.name == 'MULTIPLE_CHOICE' %}
                <input type="radio" 
                    name="correct_option_q{{ question.id }}" 
                    value="{{ option.id }}"
                    {% if option.is_correct %}checked{% endif %}
                    hx-post="/api/question/{{ question.id }}/set-correct"
                    hx-trigger="change"
                    class="w-4 h-4 text-primary-600 focus:ring-primary-500"
                >
            {% else %}
                <span class="text-gray-400 font-bold text-xs">{{ option.order }}</span>
            {% endif %}
        </div>

        <!-- Option Text Input -->
        <input type="text" 
            class="option-input text-sm" 
            value="{{ option.option_text }}"
            name="option_text"
            hx-put="/api/option/{{ option.id }}/update"
            hx-trigger="blur"
            placeholder="Opsi {{ option.order }}"
        >

        <!-- Delete Option -->
        <button class="p-1.5 text-gray-300 hover:text-red-500 opacity-0 group-hover/opt:opacity-100 transition-all"
            hx-delete="/api/option/{{ option.id }}/delete"
            hx-target="#option-{{ option.id }}"
            hx-swap="outerHTML">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
</div>
