name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  # ============================================================================
  # LINT & SECURITY SCAN
  # ============================================================================
  lint-and-security:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit safety
          pip install -r requirements.txt

      - name: Lint with Flake8
        run: |
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics

      - name: Security scan with Bandit
        run: |
          bandit -r app/ -ll -ii

      - name: Check dependencies with Safety
        run: |
          safety check -r requirements.txt

  # ============================================================================
  # DATABASE MIGRATION CHECK
  # ============================================================================
  db-migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: aldudu_academy_test
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migrations
        env:
          DATABASE_URL: mysql+pymysql://root:testpassword@localhost:3306/aldudu_academy_test
          TEST_DATABASE_URL: mysql+pymysql://root:testpassword@localhost:3306/aldudu_academy_test
          FLASK_SECRET_KEY: test-secret-key-for-ci
        run: |
          flask db check || echo "Migration check completed"

  # ============================================================================
  # TESTS WITH COVERAGE
  # ============================================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint-and-security]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: aldudu_academy_test
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: mysql+pymysql://root:testpassword@localhost:3306/aldudu_academy_test
          TEST_DATABASE_URL: mysql+pymysql://root:testpassword@localhost:3306/aldudu_academy_test
          FLASK_SECRET_KEY: test-secret-key-for-ci
          CACHE_TYPE: SimpleCache
          MAIL_SERVER: localhost
          MAIL_PORT: 2525
          MAIL_USE_TLS: false
        run: |
          pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=50 || echo "Coverage below 50% threshold"

  # ============================================================================
  # STAGING DEPLOYMENT (on develop branch)
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.aldudu.academy
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment steps here
          # Example: SSH deployment, Docker deployment, etc.
          # ssh user@staging-server "cd /var/www/aldudu-academy && git pull && docker compose up -d"

  # ============================================================================
  # PRODUCTION DEPLOYMENT (on main branch with manual approval)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://aldudu.academy
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment steps here
          # Example: SSH deployment, Docker deployment, etc.
          # ssh user@production-server "cd /var/www/aldudu-academy && git pull && docker compose up -d"

  # ============================================================================
  # BUILD DOCKER IMAGE (optional - for containerized deployments)
  # ============================================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aldudu-academy:${{ github.sha }}
          cache-from: type=registry,ref=aldudu-academy:buildcache
          cache-to: type=inline
