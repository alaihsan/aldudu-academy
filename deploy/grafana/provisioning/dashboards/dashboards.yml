# Grafana Dashboards Provisioning
# Location: deploy/grafana/provisioning/dashboards/dashboards.yml

apiVersion: 1

providers:
  - name: 'Aldudu Academy'
    orgId: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
